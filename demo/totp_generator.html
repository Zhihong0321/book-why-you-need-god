<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium TOTP & 2FA Generator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #070913 0%, #0c0f2b 50%, #170d35 100%);
            --card-bg: rgba(13, 17, 43, 0.7);
            --card-border: rgba(255, 255, 255, 0.07);
            --card-glow: rgba(99, 102, 241, 0.15);
            
            --accent-primary: #6366f1;
            --accent-primary-glow: rgba(99, 102, 241, 0.4);
            --accent-secondary: #d946ef;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Decorative ambient glows */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
        }
        body::before {
            background: var(--accent-primary);
            top: 10%;
            left: 10%;
        }
        body::after {
            background: var(--accent-secondary);
            bottom: 10%;
            right: 10%;
        }

        .container {
            width: 100%;
            max-width: 460px;
            padding: 20px;
            z-index: 1;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 32px;
            backdrop-filter: blur(24px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                        0 0 50px var(--card-glow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5), 
                        0 0 60px rgba(99, 102, 241, 0.22);
        }

        header {
            text-align: center;
            margin-bottom: 28px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Input group styling */
        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px 44px 14px 14px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.25);
        }

        .toggle-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
            padding: 4px;
        }

        .toggle-btn:hover {
            color: var(--text-primary);
        }

        /* Large Code display container */
        .otp-display-container {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .otp-code-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 10px 0;
            cursor: pointer;
            position: relative;
        }

        .otp-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            transition: transform 0.1s ease;
        }

        .otp-code-wrapper:active .otp-code {
            transform: scale(0.97);
        }

        /* Circular progress styling */
        .timer-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .timer-circle-svg {
            width: 20px;
            height: 20px;
            transform: rotate(-90deg);
        }

        .timer-circle-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 3;
        }

        .timer-circle-progress {
            fill: none;
            stroke: var(--accent-primary);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 56.5; /* 2 * PI * r (r = 9) */
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
        }

        .timer-text {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        /* Error notification */
        .error-message {
            color: var(--accent-danger);
            font-size: 12px;
            margin-top: 6px;
            display: none;
            align-items: center;
            gap: 6px;
        }

        /* Action Buttons */
        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-primary) 0%, #4f46e5 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.45);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(16, 185, 129, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* History panel */
        .history-section {
            margin-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .clear-history-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .clear-history-btn:hover {
            color: var(--accent-danger);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 120px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* Custom scrollbar */
        .history-list::-webkit-scrollbar {
            width: 4px;
        }
        .history-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .history-code {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--text-primary);
        }

        .history-time {
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <header>
                <h1>TOTP Authenticator</h1>
                <p>Secure Time-Based One-Time Password</p>
            </header>

            <div class="input-group">
                <label class="input-label" for="secretKey">2FA Secret Key</label>
                <div class="input-wrapper">
                    <input type="password" id="secretKey" class="input-field" 
                           value="cz4v oceo eph7 74t3 halm o6ug 7of5 prgo" 
                           placeholder="Enter Base32 Secret Key"
                           autocomplete="off" spellcheck="false">
                    <button id="toggleSecret" class="toggle-btn" title="Toggle Visibility">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                            <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                            <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                            <line x1="2" y1="2" x2="22" y2="22"></line>
                        </svg>
                    </button>
                </div>
                <div id="errorMessage" class="error-message">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    <span>Invalid Base32 secret key pattern</span>
                </div>
            </div>

            <div class="otp-display-container">
                <div class="otp-code-wrapper" id="copyContainer" title="Click to copy code">
                    <div id="otpCode" class="otp-code">000 000</div>
                </div>
                
                <div class="timer-container">
                    <svg class="timer-circle-svg">
                        <circle class="timer-circle-bg" cx="10" cy="10" r="9"></circle>
                        <circle id="timerProgress" class="timer-circle-progress" cx="10" cy="10" r="9"></circle>
                    </svg>
                    <span id="timerText" class="timer-text">30s remaining</span>
                </div>
            </div>

            <button id="copyBtn" class="btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                Copy Active Code
            </button>

            <div class="history-section">
                <div class="history-header">
                    <span class="history-title">Code History</span>
                    <button id="clearHistory" class="clear-history-btn">Clear</button>
                </div>
                <div id="historyList" class="history-list">
                    <!-- Items added dynamically -->
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span>Copied to Clipboard!</span>
    </div>

    <script>
        // SHA-1 Implementation
        function sha1(bytes) {
            const words = [];
            for (let i = 0; i < bytes.length; i++) {
                words[i >> 2] |= bytes[i] << (24 - (i % 4) * 8);
            }
            const bitLength = bytes.length * 8;
            words[bitLength >> 5] |= 0x80 << (24 - (bitLength % 32));
            words[(((bitLength + 64) >> 9) << 4) + 15] = bitLength;

            const w = new Array(80);
            let a = 1732584193;
            let b = -271733879;
            let c = -1732584194;
            let d = 271733878;
            let e = -1009589776;

            for (let i = 0; i < words.length; i += 16) {
                let olda = a, oldb = b, oldc = c, oldd = d, olde = e;
                for (let j = 0; j < 80; j++) {
                    if (j < 16) w[j] = words[i + j] || 0;
                    else w[j] = rol(w[j - 3] ^ w[j - 8] ^ w[j - 14] ^ w[j - 16], 1);

                    let t = safeAdd(safeAdd(rol(a, 5), sha1_ft(j, b, c, d)), safeAdd(safeAdd(e, w[j]), sha1_kt(j)));
                    e = d;
                    d = c;
                    c = rol(b, 30);
                    b = a;
                    a = t;
                }
                a = safeAdd(a, olda);
                b = safeAdd(b, oldb);
                c = safeAdd(c, oldc);
                d = safeAdd(d, oldd);
                e = safeAdd(e, olde);
            }
            
            const outBytes = new Uint8Array(20);
            const resultWords = [a, b, c, d, e];
            for (let i = 0; i < 20; i++) {
                outBytes[i] = (resultWords[i >> 2] >> (24 - (i % 4) * 8)) & 0xff;
            }
            return outBytes;
        }

        function sha1_ft(t, b, c, d) {
            if (t < 20) return (b & c) | ((~b) & d);
            if (t < 40) return b ^ c ^ d;
            if (t < 60) return (b & c) | (b & d) | (c & d);
            return b ^ c ^ d;
        }

        function sha1_kt(t) {
            return (t < 20) ? 1518500249 : (t < 40) ? 1859775393 : (t < 60) ? -1894007588 : -899497514;
        }

        function safeAdd(x, y) {
            const lsw = (x & 0xFFFF) + (y & 0xFFFF);
            const msw = (x >> 16) + (y >> 16) + (lsw >> 16);
            return (msw << 16) | (lsw & 0xFFFF);
        }

        // Left rotation helper
        function rol(num, cnt) {
            return (num << cnt) | (num >>> (32 - cnt));
        }

        // HMAC-SHA1 Implementation
        function hmac_sha1(key, message) {
            let keyBytes = key;
            if (keyBytes.length > 64) {
                keyBytes = sha1(keyBytes);
            }
            const paddedKey = new Uint8Array(64);
            paddedKey.set(keyBytes);

            const ipad = new Uint8Array(64);
            const opad = new Uint8Array(64);
            for (let i = 0; i < 64; i++) {
                ipad[i] = paddedKey[i] ^ 0x36;
                opad[i] = paddedKey[i] ^ 0x5c;
            }

            const innerMsg = new Uint8Array(64 + message.length);
            innerMsg.set(ipad);
            innerMsg.set(message, 64);
            const innerHash = sha1(innerMsg);

            const outerMsg = new Uint8Array(64 + innerHash.length);
            outerMsg.set(opad);
            outerMsg.set(innerHash, 64);
            return sha1(outerMsg);
        }

        // Base32 Decoder
        function base32ToBytes(str) {
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
            const cleaned = str.replace(/[\s=-]/g, "").toUpperCase();
            if (cleaned.length === 0) return new Uint8Array(0);
            
            const bytes = [];
            let buffer = 0;
            let bits = 0;

            for (let i = 0; i < cleaned.length; i++) {
                const val = alphabet.indexOf(cleaned[i]);
                if (val === -1) {
                    throw new Error(`Invalid Base32 character: ${cleaned[i]}`);
                }
                buffer = (buffer << 5) | val;
                bits += 5;
                if (bits >= 8) {
                    bytes.push((buffer >> (bits - 8)) & 255);
                    bits -= 8;
                }
            }
            return new Uint8Array(bytes);
        }

        // TOTP Generation Engine
        function getTOTP(secret, timeStep = 30) {
            const keyBytes = base32ToBytes(secret);
            if (keyBytes.length === 0) throw new Error("Empty secret key");
            
            const epoch = Math.round(new Date().getTime() / 1000);
            const counter = Math.floor(epoch / timeStep);
            const remaining = timeStep - (epoch % timeStep);

            const msgBytes = new Uint8Array(8);
            const high = Math.floor(counter / 0x100000000);
            const low = counter % 0x100000000;
            
            msgBytes[0] = (high >> 24) & 0xff;
            msgBytes[1] = (high >> 16) & 0xff;
            msgBytes[2] = (high >> 8) & 0xff;
            msgBytes[3] = high & 0xff;
            msgBytes[4] = (low >> 24) & 0xff;
            msgBytes[5] = (low >> 16) & 0xff;
            msgBytes[6] = (low >> 8) & 0xff;
            msgBytes[7] = low & 0xff;

            const hmacHash = hmac_sha1(keyBytes, msgBytes);

            const offset = hmacHash[hmacHash.length - 1] & 0x0f;
            const binary = ((hmacHash[offset] & 0x7f) << 24) |
                           ((hmacHash[offset + 1] & 0xff) << 16) |
                           ((hmacHash[offset + 2] & 0xff) << 8) |
                           (hmacHash[offset + 3] & 0xff);

            const otp = binary % 1000000;
            return {
                otp: otp.toString().padStart(6, "0"),
                remaining: remaining
            };
        }

        // DOM Elements
        const secretInput = document.getElementById("secretKey");
        const toggleSecretBtn = document.getElementById("toggleSecret");
        const otpCodeDisplay = document.getElementById("otpCode");
        const timerProgressCircle = document.getElementById("timerProgress");
        const timerText = document.getElementById("timerText");
        const errorMessage = document.getElementById("errorMessage");
        const copyContainer = document.getElementById("copyContainer");
        const copyBtn = document.getElementById("copyBtn");
        const toast = document.getElementById("toast");
        const historyList = document.getElementById("historyList");
        const clearHistoryBtn = document.getElementById("clearHistory");

        let lastCode = "";
        let history = [];

        // Main Update Loop
        function updateOTP() {
            const secret = secretInput.value;
            try {
                errorMessage.style.display = "none";
                const { otp, remaining } = getTOTP(secret);
                
                // Format the 6-digit code with a middle space for readability (e.g. 123 456)
                const formattedOtp = otp.slice(0, 3) + " " + otp.slice(3);
                otpCodeDisplay.textContent = formattedOtp;
                
                // Update countdown text
                timerText.textContent = `${remaining}s remaining`;
                
                // Update SVG progress ring
                const totalDash = 56.5; // 2 * PI * r (r=9)
                const offset = (remaining / 30) * totalDash;
                timerProgressCircle.style.strokeDashoffset = totalDash - offset;
                
                // Dynamic colors based on time remaining
                if (remaining <= 5) {
                    timerProgressCircle.style.stroke = "var(--accent-danger)";
                    timerText.style.color = "var(--accent-danger)";
                } else if (remaining <= 10) {
                    timerProgressCircle.style.stroke = "var(--accent-warning)";
                    timerText.style.color = "var(--accent-warning)";
                } else {
                    timerProgressCircle.style.stroke = "var(--accent-primary)";
                    timerText.style.color = "var(--text-secondary)";
                }

                // Add to history list when code changes
                if (lastCode && lastCode !== otp) {
                    addCodeToHistory(lastCode);
                }
                lastCode = otp;

            } catch (e) {
                otpCodeDisplay.textContent = "--- ---";
                timerText.textContent = "0s remaining";
                timerProgressCircle.style.strokeDashoffset = 56.5;
                if (secret.trim().length > 0) {
                    errorMessage.style.display = "flex";
                }
            }
        }

        // Toggle Secret visibility
        toggleSecretBtn.addEventListener("click", () => {
            const isPassword = secretInput.getAttribute("type") === "password";
            if (isPassword) {
                secretInput.setAttribute("type", "text");
                toggleSecretBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                `;
            } else {
                secretInput.setAttribute("type", "password");
                toggleSecretBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                        <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                        <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                        <line x1="2" y1="2" x2="22" y2="22"></line>
                    </svg>
                `;
            }
        });

        // Copy functionality
        function copyActiveCode() {
            const rawCode = otpCodeDisplay.textContent.replace(" ", "");
            if (rawCode === "------") return;
            
            navigator.clipboard.writeText(rawCode).then(() => {
                toast.classList.add("show");
                setTimeout(() => {
                    toast.classList.remove("show");
                }, 2000);
            });
        }

        copyContainer.addEventListener("click", copyActiveCode);
        copyBtn.addEventListener("click", copyActiveCode);

        // History Management
        function addCodeToHistory(code) {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const historyItem = {
                code: code.slice(0, 3) + " " + code.slice(3),
                time: timeString
            };
            
            history.unshift(historyItem);
            if (history.length > 10) history.pop();
            
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = "";
            history.forEach(item => {
                const itemEl = document.createElement("div");
                itemEl.className = "history-item";
                itemEl.innerHTML = `
                    <span class="history-code">${item.code}</span>
                    <span class="history-time">${item.time}</span>
                `;
                historyList.appendChild(itemEl);
            });
        }

        clearHistoryBtn.addEventListener("click", () => {
            history = [];
            renderHistory();
        });

        // Event listeners for real-time calculation
        secretInput.addEventListener("input", updateOTP);

        // Run updates every second
        setInterval(updateOTP, 1000);
        updateOTP();
    </script>
</body>
</html>
