var manifest=null, chapters=[], currentIdx=0, transitioning=false;

// === REFERENCE FORMATTER & PANEL ===
function fmt(str) {
  if (!str) return '';
  var clean = str.replace(/<span class="ref-tag" data-ref="[^"]*">([^<]+)<\/span>/g, '$1');
  return clean.replace(/\[([A-Z0-9]+-[0-9]+)\]/g, function(match, refId) {
    return '<span class="ref-tag" data-ref="' + refId + '">[' + refId + ']</span>';
  });
}

function showReferenceDetails(refId) {
  var registry = chapters[currentIdx] && chapters[currentIdx].referenceRegistry;
  var ref = registry && registry[refId];
  if (!ref) {
    console.warn('Reference not found in current chapter registry:', refId);
    return;
  }
  document.getElementById('refPanelTitle').textContent = ref.title || refId;
  document.getElementById('refPanelAuthor').textContent = (ref.author || 'Unknown Author') + (ref.year ? ' (' + ref.year + ')' : '');
  document.getElementById('refPanelMeta').innerHTML = '<span><strong>来源:</strong> ' + (ref.source || 'N/A') + '</span> <span><strong>类型:</strong> ' + (ref.type || 'PRIMARY') + '</span>';
  document.getElementById('refPanelUsed').innerHTML = ref.used_for || 'No description available.';
  document.getElementById('refPanel').classList.add('open');
}

document.addEventListener('click', function(e) {
  var tag = e.target.closest('.ref-tag');
  if (tag) {
    var refId = tag.getAttribute('data-ref');
    showReferenceDetails(refId);
  } else {
    var panel = document.getElementById('refPanel');
    if (panel && panel.classList.contains('open') && !panel.contains(e.target)) {
      panel.classList.remove('open');
    }
  }
});

document.addEventListener('DOMContentLoaded', function() {
  var closeBtn = document.getElementById('refPanelClose');
  if (closeBtn) {
    closeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      document.getElementById('refPanel').classList.remove('open');
    });
  }
});

// === RENDERER ===
function renderBlock(b){
  switch(b.type){
    case 'heading': return '<h'+b.level+' class="'+(b.fx||'fx-fade-up')+'">'+fmt(b.text)+'</h'+b.level+'>';
    case 'paragraph': return '<p class="'+(b.class?b.class+' ':'')+(b.fx||'fx-fade-up')+'">'+fmt(b.text)+'</p>';
    case 'quote': return '<blockquote class="'+(b.fx||'')+'">'+fmt(b.text)+'</blockquote>';
    case 'divider': return '<div class="divider"></div>';
    case 'lens': var h='<div class="lens-block fx-fade-up"><p class="lens-label">'+fmt(b.label)+'</p>';b.paragraphs.forEach(function(p){h+='<p>'+fmt(p)+'</p>';});return h+'</div>';
    case 'table': var h='<div class="table-wrap fx-fade-up"><table><thead><tr>';b.headers.forEach(function(t){h+='<th>'+fmt(t)+'</th>';});h+='</tr></thead><tbody>';b.rows.forEach(function(r){h+='<tr>';r.forEach(function(c){h+='<td>'+fmt(c)+'</td>';});h+='</tr>';});return h+'</tbody></table></div>';
    case 'list': var tag=b.ordered?'ol':'ul';var h='<'+tag+' class="fx-fade-up">';b.items.forEach(function(i){h+='<li>'+fmt(i)+'</li>';});return h+'</'+tag+'>';
    case 'typewriter': return '<p class="fx-typewriter" data-text="'+fmt(b.text).replace(/"/g,'&quot;')+'">'+fmt(b.text)+'</p>';
    case 'next': return '<p class="next-chapter fx-fade-up"><em>'+fmt(b.text)+'</em></p>';
    case 'countdown': return renderCountdown(b);
    default: return '';
  }
}

// === COUNTDOWN WIDGET ===
// Renders a dramatic countdown clock: ??:??:HH:MM:SS:ms
// Starts from 12:00:00:000 and ticks down fast.
// The ??:?? represents unknown years/days — always shown as question marks.
function renderCountdown(b) {
  var label = b.label || '我们身体窗口关上的倒数';
  var subtitle = b.subtitle || '不要害怕。我会证明给你看，这不是结束。';
  var verse = b.verse || '';
  var id = 'countdown-' + Math.random().toString(36).substr(2, 6);
  var verseHtml = verse ? '<p class="countdown-verse">' + fmt(verse) + '</p>' : '';
  return '<div class="countdown-widget fx-fade-up" id="' + id + '">' +
    '<div class="countdown-display">' +
      '<span class="cd-unknown">??</span><span class="cd-sep">:</span>' +
      '<span class="cd-unknown">??</span><span class="cd-sep">:</span>' +
      '<span class="cd-hours">--</span><span class="cd-sep">:</span>' +
      '<span class="cd-minutes">--</span><span class="cd-sep">:</span>' +
      '<span class="cd-seconds">--</span><span class="cd-sep cd-sep-ms">.</span>' +
      '<span class="cd-ms">00</span>' +
    '</div>' +
    verseHtml +
    '<p class="countdown-label">' + fmt(label) + '</p>' +
    '<p class="countdown-subtitle">' + fmt(subtitle) + '</p>' +

function renderChapter(ch){
  var html='<div class="chapter-label">'+ch.label+'</div>';
  ch.zones.forEach(function(zone){
    html+='<section class="zone" data-mood="'+zone.mood+'">';
    zone.blocks.forEach(function(b){html+=renderBlock(b);});
    html+='</section>';
  });
  if(currentIdx<manifest.chapters.length-1){
    html+='<div class="end-trigger" id="endTrigger"><p>▼ 继续下一章 ▼</p></div>';
  }
  return html;
}

async function getChapter(idx) {
  if (idx < 0 || idx >= manifest.chapters.length) return null;
  if (chapters[idx]) return chapters[idx];
  var file = manifest.chapters[idx].file;
  var ch = await (await fetch(file)).json();
  chapters[idx] = ch;
  return ch;
}

async function loadChapter(idx){
  if (typeof TTSManager !== 'undefined') {
    TTSManager.stop();
  }
  stopAllCountdowns();
  currentIdx=idx;
  var ch = await getChapter(idx);
  if (!ch) return;
  
  var widget = document.getElementById('controlWidget');
  if (widget) widget.style.display = 'flex';
  var prevBtn = document.getElementById('ctrlPrev');
  if (prevBtn) prevBtn.disabled = (idx === 0);
  var nextBtn = document.getElementById('ctrlNext');
  if (nextBtn) nextBtn.disabled = (idx === manifest.chapters.length - 1);
  
  var contentEl=document.getElementById('content');
  contentEl.innerHTML=renderChapter(ch);
  window.scrollTo(0,0);
  initEffects();
  initMoodEngine();
  
  // Set initial mood
  var firstMood=ch.zones[0].mood;
  setMood(firstMood);
  
  // Update state/hash
  var chMeta = manifest.chapters[idx];
  if (chMeta) {
    window.history.replaceState(null, null, '#' + chMeta.id);
    localStorage.setItem('yng_current_chapter', chMeta.id);
  }
  
  // Bind end trigger
  var trigger=document.getElementById('endTrigger');
  if(trigger){
    trigger.addEventListener('click', function(){
      if(!transitioning){
        goNextChapter();
      }
    });
  }
  
  // Pre-fetch next chapter in background
  if (idx < manifest.chapters.length - 1) {
    getChapter(idx + 1).catch(function(err){ console.error('Prefetch error:', err); });
  }
}

// === CHAPTER TRANSITION (Big Bang style) ===
async function goNextChapter(){
  if(transitioning||currentIdx>=manifest.chapters.length-1)return;
  transitioning=true;
  
  // Close control panel immediately
  var panel = document.getElementById('controlPanel');
  if (panel) panel.classList.remove('open');
  
  // Start preloading the next chapter immediately if not already done
  var nextChPromise = getChapter(currentIdx+1);
  var nextMeta = manifest.chapters[currentIdx+1];
  
  // Phase 0: Fade content out and slide up to get a full empty page (1.2s)
  var contentEl = document.getElementById('content');
  contentEl.style.transition = 'opacity 1.2s ease-in, transform 1.2s ease-in';
  contentEl.style.opacity = '0';
  contentEl.style.transform = 'translateY(-60px)';
  
  // Fade out control widgets
  var widget = document.getElementById('controlWidget');
  if (widget) {
    widget.style.transition = 'opacity 1s';
    widget.style.opacity = '0';
  }
  var musicToggle = document.getElementById('musicToggle');
  if (musicToggle) {
    musicToggle.style.transition = 'opacity 1s';
    musicToggle.style.opacity = '0';
  }
  
  setTimeout(function(){
    // Hide containers from layout to remove scrollbar
    contentEl.style.display = 'none';
    if (widget) widget.style.display = 'none';
    if (musicToggle) musicToggle.style.display = 'none';
    window.scrollTo(0, 0);
    
    // Phase 1: Stars collapse to center (3s) - starts AFTER page is fully empty
    bbPhase='collapse';bbTimer=0;
    
    setTimeout(function(){
      // Phase 2: Flash + title (after collapse)
      bbPhase='flash';bbTimer=0;
      setTimeout(async function(){
        // Show title overlay
        var ov=document.getElementById('bbOverlay');
        ov.classList.add('active');
        ov.style.background='rgba(248,245,240,0.95)';
        
        var nextCh = await nextChPromise;
        var label = nextCh ? nextCh.label : ('第' + (currentIdx+2) + '章 · ' + nextMeta.id);
        var title = nextCh ? nextCh.title : '加载中...';
        
        startBBTypewriter(label, title);
        setTimeout(function(){
          // Phase 3: Fade out overlay, load new chapter
          ov.style.transition='opacity 2s';
          ov.style.opacity='0';
          bbPhase='idle';bbTimer=0;bbStarRadius=0;bbScreenFade=0;
          setTimeout(function(){
            ov.classList.remove('active');
            ov.style.opacity='';ov.style.transition='';ov.style.background='';
            document.getElementById('bbText').classList.remove('show');
            document.getElementById('bbSub').textContent='';
            document.getElementById('bbTitle').textContent='';
            
            // Restore layouts
            contentEl.style.display = 'block';
            contentEl.style.transform = '';
            
            if (widget) {
              widget.style.display = 'flex';
              widget.style.opacity = '';
            }
            if (musicToggle) {
              musicToggle.style.display = 'flex';
              musicToggle.style.opacity = '';
            }
            
            // Load next chapter
            loadChapter(currentIdx+1);
            contentEl.style.opacity='1';
            transitioning=false;
          },2000);
        },6000); // hold title 6s
      },2000); // flash 2s
    },3000); // collapse 3s
  },1200); // wait for fade out to complete (1.2s)
}

function startBBTypewriter(sub,title){
  var textEl=document.getElementById('bbText'),subEl=document.getElementById('bbSub'),titleEl=document.getElementById('bbTitle');
  textEl.classList.add('show');subEl.textContent='';titleEl.textContent='';
  var cursor=document.createElement('span');cursor.className='bb-cursor';
  var i=0;subEl.appendChild(cursor);
  function typeSub(){if(i<sub.length){subEl.insertBefore(document.createTextNode(sub.charAt(i)),cursor);i++;setTimeout(typeSub,100);}else{setTimeout(function(){subEl.removeChild(cursor);i=0;titleEl.appendChild(cursor);typeTitle();},300);}}
  function typeTitle(){if(i<title.length){titleEl.insertBefore(document.createTextNode(title.charAt(i)),cursor);i++;setTimeout(typeTitle,90);}else{setTimeout(function(){cursor.style.transition='opacity 1s';cursor.style.opacity='0';},1200);}}
  typeSub();
}

// === TEXT EFFECTS ===
function initEffects(){
  var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:0.15});
  document.querySelectorAll('.fx-fade-up,.fx-glow,.fx-quote').forEach(function(el){obs.observe(el);});
  var twObs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){startTW(e.target);twObs.unobserve(e.target);}});},{threshold:0.4});
  document.querySelectorAll('.fx-typewriter').forEach(function(el){twObs.observe(el);});
  // Countdown widgets
  var cdObs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){startCountdown(e.target);cdObs.unobserve(e.target);}});},{threshold:0.3});
  document.querySelectorAll('.countdown-widget').forEach(function(el){cdObs.observe(el);});
}
function startTW(el){var text=el.getAttribute('data-text')||el.textContent;el.textContent='';el.classList.add('visible');var cursor=document.createElement('span');cursor.className='tw-cursor';el.appendChild(cursor);var i=0;(function t(){if(i<text.length){el.insertBefore(document.createTextNode(text.charAt(i)),cursor);i++;setTimeout(t,50+Math.random()*20);}else{setTimeout(function(){cursor.style.transition='opacity 1s';cursor.style.opacity='0';},1500);}})();}

// === COUNTDOWN TICKER ===
// Counts down to midnight (tomorrow 00:00:00.00). ??:?? for unknown days/years.
// Based on Luke 12:20 — "今晚就要你的灵魂" — always counting toward tonight's end.
var activeCountdowns = [];
function startCountdown(el) {
  el.classList.add('visible');
  var hoursEl = el.querySelector('.cd-hours');
  var minsEl = el.querySelector('.cd-minutes');
  var secsEl = el.querySelector('.cd-seconds');
  var msEl = el.querySelector('.cd-ms');
  if (!hoursEl) return;
  
  var cdObj = { el: el, active: true };
  activeCountdowns.push(cdObj);
  
  function tick() {
    if (!cdObj.active) return;
    var now = new Date();
    // Midnight tonight = start of tomorrow
    var midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0);
    var remaining = midnight - now; // ms until midnight
    
    if (remaining <= 0) remaining = 0;
    
    var h = Math.floor(remaining / 3600000);
    var m = Math.floor((remaining % 3600000) / 60000);
    var s = Math.floor((remaining % 60000) / 1000);
    var cs = Math.floor((remaining % 1000) / 10); // centiseconds 00-99
    
    hoursEl.textContent = h < 10 ? '0' + h : h;
    minsEl.textContent = m < 10 ? '0' + m : m;
    secsEl.textContent = s < 10 ? '0' + s : s;
    msEl.textContent = cs < 10 ? '0' + cs : cs;
    
    // Color shift in final hour
    if (h < 1) {
      hoursEl.style.color = 'rgba(255,100,80,0.95)';
      minsEl.style.color = 'rgba(255,120,90,0.9)';
    }
    if (remaining <= 0) {
      hoursEl.textContent = '00';
      minsEl.textContent = '00';
      secsEl.textContent = '00';
      msEl.textContent = '00';
      el.style.borderColor = 'rgba(255,80,60,0.3)';
      return;
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// Stop countdowns on chapter change
function stopAllCountdowns() {
  activeCountdowns.forEach(function(c) { c.active = false; });
  activeCountdowns = [];
}

var canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),W,H;
var MOODS_SF={
  calm:{count:400,speed:0.025,dir:'zoomIn',rot:0.00003,rotDir:1,glow:0.6,aurora:'radial-gradient(ellipse at 35% 45%,rgba(12,30,75,0.55) 0%,rgba(6,12,35,0.2) 40%,transparent 70%)'},

  weight:{count:300,speed:0.012,dir:'sink',rot:0.00002,rotDir:-1,glow:0.35,aurora:'radial-gradient(ellipse at 50% 50%,rgba(10,8,25,0.35) 0%,rgba(5,4,15,0.12) 40%,transparent 65%)'}
};
var stars=[],angle=0,targetSF=MOODS_SF.calm;
var rt={count:400,speed:0.025,dir:'zoomIn',rot:0.00003,rotDir:1,glow:0.6};
var bbPhase='idle',bbTimer=0,bbStarRadius=0,bbScreenFade=0;
var COLORS=[[210,225,255],[255,252,240],[230,235,255],[195,215,255],[255,240,220],[255,220,180],[255,195,170]];
function pickColor(){var r=Math.random();if(r<.35)return COLORS[0];if(r<.55)return COLORS[1];if(r<.70)return COLORS[2];if(r<.82)return COLORS[3];if(r<.90)return COLORS[4];if(r<.96)return COLORS[5];return COLORS[6];}
function spawnStar(dir){var x,y;switch(dir){case'zoomIn':var a=Math.random()*Math.PI*2,d=Math.random()*60+5;x=W/2+Math.cos(a)*d;y=H/2+Math.sin(a)*d;break;case'rise':x=Math.random()*W;y=H+20;break;case'sink':x=Math.random()*W;y=-20;break;default:x=Math.random()*W;y=Math.random()*H;}return{x:x,y:y,r:0.2+Math.pow(Math.random(),2.5)*1.5,col:pickColor(),bright:0.25+Math.random()*0.55,phase:Math.random()*Math.PI*2,speed:0.004+Math.random()*0.012};}
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
function initStars(n){stars=[];for(var i=0;i<n;i++)stars.push(spawnStar('clockwise'));}
function lerp(a,b,t){return a+(b-a)*t;}

function sfUpdate(){
  var t=0.04;
  // During Big Bang collapse: override direction
  if(bbPhase==='collapse'){
    bbTimer++;
    var p=bbTimer/180; // 3s at 60fps
    var accel=p*p*p;
    var cx=W/2,cy=H/2;
    for(var i=0;i<stars.length;i++){var s=stars[i];var dx=s.x-cx,dy=s.y-cy;s.x-=dx*(0.005+accel*0.07);s.y-=dy*(0.005+accel*0.07);s.phase+=s.speed;}
    return;
  }
  if(bbPhase==='flash'){
    bbTimer++;
    var p=Math.min(1,bbTimer/120);
    bbStarRadius=1+p*p*40;
    bbScreenFade=p*p*0.5;
    for(var i=0;i<stars.length;i++){stars[i].bright*=0.95;}
    return;
  }
  rt.speed=lerp(rt.speed,targetSF.speed,t);rt.rot=lerp(rt.rot,targetSF.rot,t);rt.glow=lerp(rt.glow,targetSF.glow,t);
  rt.count=Math.round(lerp(rt.count,targetSF.count,t*0.5));rt.rotDir=targetSF.rotDir;rt.dir=targetSF.dir;
  if(stars.length<rt.count){var add=Math.min(12,rt.count-stars.length);for(var i=0;i<add;i++)stars.push(spawnStar(rt.dir));}
  if(stars.length>rt.count)stars.splice(stars.length-Math.min(12,stars.length-rt.count));
  angle+=rt.rot*rt.rotDir;
  var cx=W/2,cy=H/2;
  for(var i=0;i<stars.length;i++){var s=stars[i];
    switch(rt.dir){case'zoomIn':var dx=s.x-cx,dy=s.y-cy;s.x+=dx*rt.speed*0.012;s.y+=dy*rt.speed*0.012;break;case'rise':s.y-=rt.speed*1.2;s.x+=Math.sin(s.phase*0.3)*rt.speed*0.15;break;case'sink':s.y+=rt.speed*1.0;break;default:var dx=s.x-cx,dy=s.y-cy;s.x+=dx*rt.speed*0.003;s.y+=dy*rt.speed*0.003;}
    s.phase+=s.speed;
    if(s.x<-30||s.x>W+30||s.y<-30||s.y>H+30){var ns=spawnStar(rt.dir);s.x=ns.x;s.y=ns.y;s.r=ns.r;s.col=ns.col;s.bright=ns.bright;}
  }
}
function sfDraw(){
  ctx.clearRect(0,0,W,H);ctx.save();ctx.translate(W/2,H/2);ctx.rotate(angle);ctx.translate(-W/2,-H/2);
  for(var i=0;i<stars.length;i++){var s=stars[i],tw=0.55+0.45*Math.sin(s.phase),alpha=s.bright*tw*rt.glow,r=s.r;
    if(r<0.5){ctx.fillStyle='rgba('+s.col[0]+','+s.col[1]+','+s.col[2]+','+alpha+')';ctx.fillRect(s.x,s.y,r*2,r*2);}
    else{ctx.beginPath();ctx.arc(s.x,s.y,r,0,Math.PI*2);ctx.fillStyle='rgba('+s.col[0]+','+s.col[1]+','+s.col[2]+','+alpha+')';ctx.fill();
      if(r>1&&alpha>0.25){ctx.beginPath();ctx.arc(s.x,s.y,r*2.8,0,Math.PI*2);ctx.fillStyle='rgba('+s.col[0]+','+s.col[1]+','+s.col[2]+','+(alpha*0.1)+')';ctx.fill();}}}
  // Big Bang center star
  if(bbStarRadius>0){var cx=W/2,cy=H/2,outerR=bbStarRadius*8;var g=ctx.createRadialGradient(cx,cy,0,cx,cy,outerR);g.addColorStop(0,'rgba(255,253,248,0.95)');g.addColorStop(0.03,'rgba(255,250,242,0.9)');g.addColorStop(0.1,'rgba(255,248,238,0.6)');g.addColorStop(0.25,'rgba(255,245,232,0.25)');g.addColorStop(0.5,'rgba(250,240,228,0.08)');g.addColorStop(1,'rgba(245,238,225,0)');ctx.fillStyle=g;ctx.fillRect(cx-outerR,cy-outerR,outerR*2,outerR*2);}
  ctx.restore();
  if(bbScreenFade>0){ctx.fillStyle='rgba(248,245,240,'+bbScreenFade+')';ctx.fillRect(0,0,W,H);}
}
function sfLoop(){sfUpdate();sfDraw();requestAnimationFrame(sfLoop);}

var MAX_VOL=0.28,FADE_MS=5000,currentAudio=null,isMuted=false,activeFades=new Map(),currentMood='calm';
var TRACK_INFO={'track-calm':{title:'Snowfall',artist:'Scott Buckley'},'track-wonder':{title:'Filaments',artist:'Scott Buckley'},'track-awe':{title:'Horizons',artist:'Scott Buckley'},'track-weight':{title:'Escape',artist:'Sappheiros'}};
var MOOD_TRACK={calm:'track-calm',wonder:'track-wonder',awe:'track-awe',weight:'track-weight'};
function fadeVol(audio,from,to,dur,cb){var ex=activeFades.get(audio);if(ex)clearInterval(ex);var steps=50,st=dur/steps,step=0;audio.volume=Math.max(0,Math.min(1,from));var iv=setInterval(function(){step++;var p=step/steps,e=0.5-0.5*Math.cos(Math.PI*p);audio.volume=Math.max(0,Math.min(1,from+(to-from)*e));if(step>=steps){clearInterval(iv);activeFades.delete(audio);audio.volume=Math.max(0,Math.min(1,to));if(cb)cb();}},st);activeFades.set(audio,iv);}
function transitionMusic(trackId){var a=document.getElementById(trackId);if(!a||a===currentAudio)return;if(currentAudio){var old=currentAudio;fadeVol(old,old.volume,0,FADE_MS,function(){old.pause();});}var vol=isMuted?0:MAX_VOL;a.volume=0;a.play().catch(function(){});setTimeout(function(){fadeVol(a,0,vol,FADE_MS);},600);currentAudio=a;}

  updateMusicButtonState();
  if (currentAudio) {
    if (isMuted) fadeVol(currentAudio, currentAudio.volume, 0, 1500);
    else fadeVol(currentAudio, 0, MAX_VOL, 1500);
  }
}
document.getElementById('musicToggle').addEventListener('click', toggleMuteState);

// === CONTROL WIDGET LOGIC ===
var FONT_SIZES = [
  { size: '0.9rem', label: '85%' },
  { size: '0.975rem', label: '93%' },
  { size: '1.05rem', label: '100%' },
  { size: '1.15rem', label: '110%' },
  { size: '1.25rem', label: '120%' },
  { size: '1.35rem', label: '130%' }
];
var currentFontIdx = 2;

function setFontSize(idx) {
  currentFontIdx = Math.max(0, Math.min(FONT_SIZES.length - 1, idx));
  var fontObj = FONT_SIZES[currentFontIdx];
  document.documentElement.style.setProperty('--reader-font-size', fontObj.size);
  var valEl = document.getElementById('ctrlFontVal');
  if (valEl) valEl.textContent = fontObj.label;
  var decEl = document.getElementById('ctrlFontDec');
  if (decEl) decEl.disabled = (currentFontIdx === 0);
  var incEl = document.getElementById('ctrlFontInc');
  if (incEl) incEl.disabled = (currentFontIdx === FONT_SIZES.length - 1);
  localStorage.setItem('yng_font_size_idx', currentFontIdx);
}

async function navigateToChapter(idx) {
  if (transitioning || idx < 0 || idx >= manifest.chapters.length) return;
  transitioning = true;
  
  var panel = document.getElementById('controlPanel');
  if (panel) panel.classList.remove('open');
  
  var contentEl = document.getElementById('content');
  contentEl.style.transition = 'opacity 0.4s ease';
  contentEl.style.opacity = '0';
  
  setTimeout(async function() {
    await loadChapter(idx);
    contentEl.style.opacity = '1';
    setTimeout(function() {
      transitioning = false;
    }, 400);
  }, 400);
}

function initControlWidget() {
  var trigger = document.getElementById('controlTrigger');
  var panel = document.getElementById('controlPanel');
  
  if (trigger && panel) {
    trigger.addEventListener('click', function(e) {
      e.stopPropagation();
      panel.classList.toggle('open');
    });
    
    document.addEventListener('click', function(e) {
      var widget = document.getElementById('controlWidget');
      if (widget && !widget.contains(e.target)) {
        panel.classList.remove('open');
      }
    });
  }
  
  var decEl = document.getElementById('ctrlFontDec');
  if (decEl) {
    decEl.addEventListener('click', function() {
      setFontSize(currentFontIdx - 1);
    });
  }
  var incEl = document.getElementById('ctrlFontInc');
  if (incEl) {
    incEl.addEventListener('click', function() {
      setFontSize(currentFontIdx + 1);
    });
  }
  
  var prevEl = document.getElementById('ctrlPrev');
  if (prevEl) {
    prevEl.addEventListener('click', function() {
      if (currentIdx > 0) navigateToChapter(currentIdx - 1);
    });
  }
  var nextEl = document.getElementById('ctrlNext');
  if (nextEl) {
    nextEl.addEventListener('click', function() {
      if (currentIdx < manifest.chapters.length - 1) navigateToChapter(currentIdx + 1);
    });
  }
  var tocEl = document.getElementById('ctrlTOC');
  if (tocEl) {
    tocEl.addEventListener('click', function() {
      var tocIdx = 0;
      for (var i = 0; i < manifest.chapters.length; i++) {
        if (manifest.chapters[i].id === 'TOCNT') {
          tocIdx = i;
          break;
        }
      }
      navigateToChapter(tocIdx);
    });
  }
  
  var musicCtrl = document.getElementById('ctrlMusicToggle');
  if (musicCtrl) {
    musicCtrl.addEventListener('click', toggleMuteState);
  }
  
  var savedFontIdx = localStorage.getItem('yng_font_size_idx');
  if (savedFontIdx !== null) {
    setFontSize(parseInt(savedFontIdx, 10));
  } else {
    setFontSize(2);
  }
  
  updateMusicButtonState();
  if (typeof TTSManager !== 'undefined') {
    TTSManager.init();
  }
}

var toastTimer=null;
function showToast(trackId){var info=TRACK_INFO[trackId];if(!info)return;var t=document.getElementById('musicToast'),tx=document.getElementById('toastText');tx.textContent=info.title+' \u2014 '+info.artist;if(toastTimer)clearTimeout(toastTimer);t.classList.remove('visible','glow');setTimeout(function(){t.classList.add('visible');},50);setTimeout(function(){t.classList.add('glow');},400);setTimeout(function(){t.classList.remove('glow');},1800);toastTimer=setTimeout(function(){t.classList.remove('visible');},5000);}
function flashScene(){var el=document.getElementById('sceneFlash');el.classList.add('flash');setTimeout(function(){el.classList.remove('flash');},1200);}
function setMood(mood){var m=MOODS_SF[mood];if(!m)return;currentMood=mood;targetSF=m;document.getElementById('au').style.background=m.aurora;flashScene();var tid=MOOD_TRACK[mood];if(tid){transitionMusic(tid);showToast(tid);}}

// Autoplay on first click
document.addEventListener('click',function(){if(currentAudio)return;var a=document.getElementById('track-calm');if(a){a.volume=0;a.play().catch(function(){});fadeVol(a,0,isMuted?0:MAX_VOL,FADE_MS);currentAudio=a;showToast('track-calm');}},{once:true});

function showBookCover(hasSavedProgress) {
  var coverEl = document.getElementById('bookCover');
  if (coverEl) {
    coverEl.style.display = 'flex';
    coverEl.style.opacity = '1';
    coverEl.classList.remove('fade-out');
  }
  var btn = document.getElementById('startReadingBtn');
  if (btn) {
    btn.textContent = hasSavedProgress ? '继续阅读' : '开始阅读';
  }
  // Disable canvas and controls on cover display
  document.getElementById('c').style.opacity = '0';
  document.getElementById('musicToggle').style.display = 'none';
  var widget = document.getElementById('controlWidget');
  if (widget) widget.style.display = 'none';
  window.history.replaceState(null, null, '#cover');
}

function startReading() {
  var coverEl = document.getElementById('bookCover');
  if (!coverEl) return;
  coverEl.classList.add('fade-out');
  
  var canvasEl = document.getElementById('c');
  canvasEl.style.transition = 'opacity 2s ease';
  canvasEl.style.opacity = '1';
  document.getElementById('musicToggle').style.display = 'flex';
  var widget = document.getElementById('controlWidget');
  if (widget) widget.style.display = 'flex';
  
  setTimeout(function() {
    coverEl.style.display = 'none';
    var startIdx = 0;
    var savedId = localStorage.getItem('yng_current_chapter');
    if (savedId && manifest) {
      for (var i = 0; i < manifest.chapters.length; i++) {
        if (manifest.chapters[i].id === savedId) {
          startIdx = i;
          break;
        }
      }
    }
    loadChapter(startIdx);
  }, 1500);
}

// Bind button listener
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('startReadingBtn');
  if (btn) btn.addEventListener('click', startReading);
});

// === TTS NATIVE SPEECH SYNTHESIS ===
var TTSManager = {
  elements: [],
  utterances: [],
  currentIndex: -1,
  isPlaying: false,
  isPaused: false,
  
  init: function() {
    var self = this;
    var playBtn = document.getElementById('ctrlTTSPlay');
    var stopBtn = document.getElementById('ctrlTTSStop');
    
    if (playBtn) {
      playBtn.addEventListener('click', function() {
        if (!self.isPlaying) {
          self.start();
        } else if (self.isPaused) {
          self.resume();
        } else {
          self.pause();
        }
      });
    }
    
    if (stopBtn) {
      stopBtn.addEventListener('click', function() {
        self.stop();
      });
    }
  },
  
  start: function() {
    var self = this;
    self.stop(); // Clear any existing speech
    
    // Find all readable block elements inside #content
    var contentEl = document.getElementById('content');
    if (!contentEl) return;
    
    // Gather readable tags
    var query = 'p, li, blockquote, h1, h2, h3, h4';
    var rawEls = contentEl.querySelectorAll(query);
    self.elements = [];
    self.utterances = [];
    
    rawEls.forEach(function(el) {
      // Skip the endTrigger itself, and hidden/empty blocks
      if (el.closest('.end-trigger') || el.classList.contains('end-trigger')) return;
      var text = el.textContent || '';
      // Strip citation tags: [NDEXP-010], [RSDLT-012], etc.
      text = text.replace(/\[[A-Z0-9]+-[0-9]+\]/g, '').trim();
      if (text.length > 0) {
        self.elements.push(el);
        self.utterances.push(text);
      }
    });
    
    if (self.elements.length === 0) return;
    
    self.isPlaying = true;
    self.isPaused = false;
    self.currentIndex = 0;
    self.updateUI();
    self.speakCurrent();
  },
  
  speakCurrent: function() {
    var self = this;
    if (self.currentIndex < 0 || self.currentIndex >= self.elements.length) {
      self.stop();
      return;
    }
    
    // Cancel first just in case to prevent getting stuck
    window.speechSynthesis.cancel();
    
    var text = self.utterances[self.currentIndex];
    var el = self.elements[self.currentIndex];
    
    var u = new SpeechSynthesisUtterance(text);
    
    // Choose Chinese voice if available
    var voices = window.speechSynthesis.getVoices();
    var zhVoice = voices.find(function(v) { return v.lang.startsWith('zh') || v.lang.startsWith('ZH'); });
    if (zhVoice) u.voice = zhVoice;
    
    u.onstart = function() {
      // Highlight the paragraph
      self.clearHighlights();
      el.classList.add('tts-active-para');
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    };
    
    u.onend = function() {
      el.classList.remove('tts-active-para');
      if (self.isPlaying && !self.isPaused) {
        self.currentIndex++;
        self.speakCurrent();
      }
    };
    
    u.onerror = function(e) {
      console.warn('TTS utterance error:', e);
      // If error (e.g. interrupted), don't break loop unless stopped
      if (self.isPlaying && !self.isPaused) {
        self.currentIndex++;
        self.speakCurrent();
      }
    };
    
    window.speechSynthesis.speak(u);
  },
  
  pause: function() {
    var self = this;
    if (self.isPlaying && !self.isPaused) {
      window.speechSynthesis.pause();
      self.isPaused = true;
      self.updateUI();
    }
  },
  
  resume: function() {
    var self = this;
    if (self.isPlaying && self.isPaused) {
      window.speechSynthesis.resume();
      self.isPaused = false;
      self.updateUI();
    }
  },
  
  stop: function() {
    var self = this;
    window.speechSynthesis.cancel();
    self.clearHighlights();
    self.isPlaying = false;
    self.isPaused = false;
    self.currentIndex = -1;
    self.elements = [];
    self.utterances = [];
    self.updateUI();
  },
  
  clearHighlights: function() {
    var active = document.querySelectorAll('.tts-active-para');
    active.forEach(function(el) {
      el.classList.remove('tts-active-para');
    });
  },
  
  updateUI: function() {
    var playBtn = document.getElementById('ctrlTTSPlay');
    var stopBtn = document.getElementById('ctrlTTSStop');
    
    if (playBtn) {
      if (!this.isPlaying) {
        playBtn.textContent = '朗读';
      } else if (this.isPaused) {
        playBtn.textContent = '继续';
      } else {
        playBtn.textContent = '暂停';
      }
    }
    
    if (stopBtn) {
      stopBtn.disabled = !this.isPlaying;
    }
  }
};

// === BOOT ===
async function boot(){
  var resp=await fetch('manifest.json');manifest=await resp.json();
  chapters = new Array(manifest.chapters.length).fill(null);
  
  initControlWidget();
  
  var hash = window.location.hash.substring(1);
  var savedId = localStorage.getItem('yng_current_chapter');
  
  if (hash === 'cover' || (!hash && !savedId)) {
    showBookCover(false);
  } else if (!hash && savedId) {
    showBookCover(true);
  } else {
    var coverEl = document.getElementById('bookCover');
    if (coverEl) coverEl.style.display = 'none';
    
    var startIdx = 0;
    for (var i = 0; i < manifest.chapters.length; i++) {
      if (manifest.chapters[i].id === hash) {
        startIdx = i;
        break;
      }
    }
    loadChapter(startIdx);
  }
}

window.addEventListener('hashchange', function() {
  var hash = window.location.hash.substring(1);
  if (hash === 'cover') {
    var savedId = localStorage.getItem('yng_current_chapter');
    showBookCover(!!savedId);
  } else if (hash && manifest) {
    for (var i = 0; i < manifest.chapters.length; i++) {
      if (manifest.chapters[i].id === hash && i !== currentIdx) {
        var coverEl = document.getElementById('bookCover');
        if (coverEl) coverEl.style.display = 'none';
        loadChapter(i);
        break;
      }
    }
  }
});

resize();initStars(rt.count);document.getElementById('au').style.background=targetSF.aurora;sfLoop();
window.addEventListener('resize',resize);
boot();
